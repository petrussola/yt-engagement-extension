<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Engage-o-meter</title>
    <script type="module" src="./popup.ts"></script>
  </head>
  <body>
    <main class="popup">
      <h1>YouTube Engage-o-meter</h1>
      <p><strong>Status:</strong> Active on YouTube</p>
      <p>Analyzes visible views, likes, and comments.</p>
      <label class="toggle-row">
        <span>
          <span class="toggle-title">Debug details</span>
          <span class="toggle-description"
            >Show parsed counts and calculation.</span
          >
        </span>
        <input id="debug-details-toggle" type="checkbox" />
      </label>
      <p id="debug-status" class="status-message" role="status">
        Checking current tab...
      </p>
    </main>
  </body>
</html>
